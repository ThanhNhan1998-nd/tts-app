<!DOCTYPE html>
<html>
<head>
<title>TTS ULTIMATE</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: white;
}

.container {
    width: 55%;
    margin: auto;
    margin-top: 40px;
    background: #111827;
    padding: 25px;
    border-radius: 16px;
}

textarea {
    width: 100%;
    height: 140px;
    border-radius: 10px;
    padding: 10px;
}

select, input, button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
}

button {
    width: 100%;
    background: linear-gradient(90deg,#22c55e,#06b6d4);
    border: none;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    opacity: 0.9;
}

audio {
    width: 100%;
    margin-top: 15px;
}

#loading {
    display: none;
    color: #38bdf8;
    margin-top: 10px;
}

.history {
    margin-top: 20px;
    font-size: 13px;
    color: #94a3b8;
}
</style>

</head>

<body>

<div class="container">

<h2>🚀 TTS ULTIMATE</h2>

<form id="form">

<textarea name="text" placeholder="Nhập nội dung..." required></textarea>

<br>

<select name="voice">
    <option value="female_north">Nữ miền Bắc</option>
    <option value="male_north">Nam miền Bắc</option>
</select>

<br>

<label>Tốc độ</label><br>
<input type="range" name="rate" min="-50" max="50" value="0"
       oninput="rateText.innerText=this.value + '%'">
<span id="rateText">0%</span>

<br>

<button type="submit">⚡ Generate AI Voice</button>

</form>

<div id="loading">⏳ AI đang xử lý...</div>

<audio id="audio" controls></audio>

<br>

<a id="download" style="display:none;">⬇️ Download</a>

<div class="history" id="history">
<h4>📜 History</h4>
</div>

</div>

<script>

async function loadHistory(){
    let res = await fetch("/history");
    let data = await res.json();

    let box = document.getElementById("history");
    box.innerHTML = "<h4>📜 History</h4>";

    data.forEach(item=>{
        let div = document.createElement("div");
        div.innerText = "✔ " + item.text;
        box.appendChild(div);
    });
}

document.getElementById("form").addEventListener("submit", async function(e){
    e.preventDefault();

    document.getElementById("loading").style.display = "block";

    let formData = new FormData(this);

    let res = await fetch("/tts", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    if(data.error){
        alert(data.error);
        document.getElementById("loading").style.display = "none";
        return;
    }

    let file = data.file;

    let audio = document.getElementById("audio");
    audio.src = data.audio;
    audio.play();

    let download = document.getElementById("download");
    download.href = "/download/" + file;
    download.style.display = "block";

    document.getElementById("loading").style.display = "none";

    loadHistory();
});

loadHistory();

</script>

</body>
</html>
